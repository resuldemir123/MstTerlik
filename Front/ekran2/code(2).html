</div>
</div>

<!-- Women Section -->

<div class="absolute inset-0 bg-women-hero transition-transform duration-700 group-active:scale-105 filter blur-[1px]" data-alt="High quality feminine luxury slippers on soft rug"></div>
<div class="absolute inset-0 bg-tertiary/10 mix-blend-multiply"></div>

</div>
</div>
<!-- Accent detail -->
<div class="absolute top-0 left-0 w-1 h-full bg-tertiary"></div>
</a>
